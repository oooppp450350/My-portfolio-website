# SRT 字卡類型定義
# 每種類型都有特定的使用情境與視覺呈現

card_types:
  - type: "金色重點"
    usage: "核心結論、最關鍵一句、重要觀點"
    examples:
      - "總結性的關鍵句"
      - "核心概念定義"
      - "最重要的行動建議"
    color: "gold"
    
  - type: "白色提醒"
    usage: "建議、提醒、注意事項、補充說明"
    examples:
      - "操作建議"
      - "注意事項"
      - "補充資訊"
    color: "white"
    
  - type: "紅色警告"
    usage: "風險、錯誤、踩雷、危險操作、常見誤區"
    examples:
      - "常見錯誤"
      - "風險提醒"
      - "避免踩雷"
    color: "red"
    
  - type: "藍色列點"
    usage: "條列、步驟、清單感、多項並列"
    examples:
      - "步驟說明"
      - "多個選項"
      - "條列式重點"
    color: "blue"

# 字卡選擇原則
selection_principles:
  - "每 10 段字幕內至少新增 2 個字卡"
  - "字卡內容必須從該段字幕萃取，10~16 字內"
  - "根據內容情境選擇適當類型"
  - "優先標註關鍵資訊、風險點、重要步驟"
  - "避免過度標註，保持精簡有力"
