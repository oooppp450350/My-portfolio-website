<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844" style="background:#fff;font-family:sans-serif">
  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="44" fill="#f5f5f5"/>
  <text x="20" y="28" font-size="12" fill="#333">9:41</text>
  <rect x="320" y="14" width="50" height="16" rx="4" fill="#ccc"/>

  <!-- Back arrow -->
  <g transform="translate(15,54)">
    <polyline points="10,10 4,16 10,22" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Search bar -->
  <rect x="15" y="88" width="360" height="44" rx="22" fill="#ece6f0"/>
  <text x="55" y="115" font-size="14" fill="#888">Hinted search text</text>
  <circle cx="34" cy="110" r="8" stroke="#888" stroke-width="1.5" fill="none"/>
  <line x1="40" y1="116" x2="44" y2="120" stroke="#888" stroke-width="1.5"/>

  <!-- Preset chips row -->
  <text x="18" y="152" font-size="12" fill="#444">目前預設：</text>
  <rect x="90" y="138" width="52" height="24" rx="6" fill="none" stroke="#bbb" stroke-width="1"/>
  <text x="103" y="155" font-size="11" fill="#666">#活動</text>
  <rect x="148" y="138" width="52" height="24" rx="6" fill="none" stroke="#bbb" stroke-width="1"/>
  <text x="158" y="155" font-size="11" fill="#666">#台中</text>
  <rect x="206" y="138" width="68" height="24" rx="6" fill="none" stroke="#bbb" stroke-width="1"/>
  <text x="214" y="155" font-size="11" fill="#666">#價格區間</text>
  <circle cx="352" cy="150" r="10" fill="none" stroke="#bbb" stroke-width="1.5"/>

  <!-- Divider -->
  <line x1="15" y1="172" x2="375" y2="172" stroke="#e0e0e0" stroke-width="1"/>

  <!-- 地點 section -->
  <rect x="15" y="178" width="360" height="60" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="26" y="193" width="20" height="20" rx="10" fill="#e8e8e8"/>
  <text x="54" y="208" font-size="16" font-weight="600" fill="#222">地點</text>
  <polyline points="362,198 368,208 362,218" stroke="#555" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 類型 section -->
  <rect x="15" y="246" width="360" height="110" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="26" y="258" width="20" height="20" rx="3" fill="#e8e8e8"/>
  <text x="54" y="273" font-size="16" font-weight="600" fill="#222">類型：</text>
  <!-- Tag toggles -->
  <rect x="26" y="286" width="60" height="30" rx="8" fill="#2c2c2c"/>
  <text x="34" y="306" font-size="13" fill="#fff">✓ 餐廳</text>
  <rect x="94" y="286" width="52" height="30" rx="8" fill="#f5f5f5" stroke="#222" stroke-width="1"/>
  <text x="105" y="306" font-size="13" fill="#666">景點</text>
  <rect x="154" y="286" width="52" height="30" rx="8" fill="#f5f5f5" stroke="#222" stroke-width="1"/>
  <text x="162" y="306" font-size="13" fill="#666">活動</text>
  <!-- Dropdown -->
  <rect x="26" y="324" width="340" height="28" fill="none" stroke="#222" stroke-width="1"/>
  <text x="36" y="342" font-size="13" fill="#333">餐廳類型</text>
  <polyline points="356,331 362,338 368,331" stroke="#555" stroke-width="1.5" fill="none"/>

  <!-- 造訪狀態 section -->
  <rect x="15" y="364" width="360" height="80" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="26" y="376" width="20" height="20" rx="3" fill="#e8e8e8"/>
  <text x="54" y="391" font-size="16" font-weight="600" fill="#222">造訪狀態：</text>
  <rect x="26" y="406" width="80" height="30" rx="8" fill="#2c2c2c"/>
  <text x="30" y="426" font-size="12" fill="#fff">✓ 尚未造訪</text>
  <rect x="114" y="406" width="60" height="30" rx="8" fill="#f5f5f5" stroke="#222" stroke-width="1"/>
  <text x="125" y="426" font-size="12" fill="#666">已造訪</text>
  <rect x="182" y="406" width="72" height="30" rx="8" fill="#f5f5f5" stroke="#222" stroke-width="1"/>
  <text x="190" y="426" font-size="12" fill="#666">口袋名單</text>

  <!-- 價格區間 section -->
  <rect x="15" y="452" width="360" height="100" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="26" y="464" width="20" height="20" rx="10" fill="#e8e8e8"/>
  <text x="54" y="479" font-size="16" font-weight="600" fill="#222">價格區間：</text>
  <text x="26" y="506" font-size="11" fill="#888">$0~100</text>
  <text x="335" y="506" font-size="11" fill="#888">$1000&lt;</text>
  <!-- Slider track -->
  <line x1="26" y1="520" x2="365" y2="520" stroke="#ccc" stroke-width="6" stroke-linecap="round"/>
  <line x1="26" y1="520" x2="155" y2="520" stroke="#2c2c2c" stroke-width="6" stroke-linecap="round"/>
  <circle cx="155" cy="520" r="8" fill="#2c2c2c"/>
  <text x="130" y="542" font-size="11" fill="#444">$200~400</text>

  <!-- Apply checkbox row -->
  <rect x="26" y="562" width="20" height="20" fill="none" stroke="#222" stroke-width="1.5"/>
  <text x="54" y="577" font-size="13" fill="#333">套用當前篩選條件為預設顯示</text>

  <!-- 確認 button -->
  <rect x="15" y="596" width="360" height="50" rx="8" fill="#2c2c2c"/>
  <text x="175" y="627" font-size="16" fill="#fff" text-anchor="middle">確認</text>

  <!-- Bottom nav -->
  <rect x="0" y="768" width="390" height="76" fill="#f3edf7"/>
  <g transform="translate(65,780)">
    <rect x="0" y="0" width="24" height="24" rx="3" fill="#ccc"/>
    <text x="12" y="42" font-size="11" fill="#49454f" text-anchor="middle">篩選</text>
  </g>
  <g transform="translate(183,780)">
    <rect x="0" y="0" width="24" height="24" rx="12" fill="#ccc"/>
    <text x="12" y="42" font-size="11" fill="#49454f" text-anchor="middle">匯入 Reels</text>
  </g>
  <g transform="translate(301,780)">
    <rect x="0" y="0" width="24" height="24" rx="3" fill="#ccc"/>
    <text x="12" y="42" font-size="11" fill="#49454f" text-anchor="middle">個人頁面</text>
  </g>
</svg>
