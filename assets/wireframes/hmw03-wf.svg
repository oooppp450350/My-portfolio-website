<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844" style="background:#fff;font-family:sans-serif">
  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="44" fill="#fff"/>
  <text x="54" y="28" font-size="15" font-weight="600" fill="#000" text-anchor="middle">9:41</text>
  
  <g transform="translate(290, 16)">
    <rect x="0" y="8" width="3" height="4" fill="#000" rx="1"/>
    <rect x="5" y="5" width="3" height="7" fill="#000" rx="1"/>
    <rect x="10" y="2" width="3" height="10" fill="#000" rx="1"/>
    <rect x="15" y="0" width="3" height="12" fill="#000" rx="1"/>
  </g>
  <g transform="translate(315, 14)">
    <path d="M 0 5 A 10 10 0 0 1 16 5 M 3 9 A 6 6 0 0 1 13 9 M 7 13 A 2 2 0 0 1 9 13" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(340, 15)">
    <rect x="0" y="0" width="22" height="11" rx="3.5" fill="none" stroke="#000" stroke-width="1.5"/>
    <rect x="2" y="2" width="15" height="7" rx="1.5" fill="#000"/>
    <path d="M 23 3.5 V 7.5" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Search bar -->
  <rect x="16" y="70" width="358" height="48" rx="24" fill="#F4EFF6"/>
  <g transform="translate(34, 86)">
    <line x1="0" y1="0" x2="16" y2="0" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="5" x2="16" y2="5" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="16" y2="10" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="68" y="99" font-size="15" fill="#605D64">Hinted search text</text>
  <g transform="translate(332, 85)">
    <circle cx="6" cy="6" r="6" stroke="#333" stroke-width="1.5" fill="none"/>
    <line x1="10" y1="10" x2="16" y2="16" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Filter Defaults Sub-header -->
  <text x="24" y="152" font-size="15" font-weight="600" fill="#000">目前預設：</text>
  
  <g transform="translate(110, 134)">
    <rect x="0" y="0" width="60" height="26" rx="6" fill="#fff" stroke="#CFCFCF" stroke-width="1"/>
    <text x="30" y="17" font-size="12" fill="#555" text-anchor="middle">#餐廳</text>
  </g>
  <g transform="translate(180, 134)">
    <rect x="0" y="0" width="60" height="26" rx="6" fill="#fff" stroke="#CFCFCF" stroke-width="1"/>
    <text x="30" y="17" font-size="12" fill="#555" text-anchor="middle">#善化</text>
  </g>
  <g transform="translate(250, 134)">
    <rect x="0" y="0" width="84" height="26" rx="6" fill="#fff" stroke="#CFCFCF" stroke-width="1"/>
    <text x="42" y="17" font-size="12" fill="#555" text-anchor="middle">#價格區間</text>
  </g>

  <!-- Cog wheel icon -->
  <g transform="translate(346, 137)">
    <circle cx="9" cy="9" r="4" stroke="#000" stroke-width="2" fill="none"/>
    <path d="M 9 2 V 4 M 9 14 V 16 M 2 9 H 4 M 14 9 H 16 M 4.05 4.05 L 5.46 5.46 M 12.54 12.54 L 13.95 13.95 M 4.05 13.95 L 5.46 12.54 M 12.54 5.46 L 13.95 4.05" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  </g>

  <defs>
    <g id="card-template">
      <rect x="0" y="0" width="358" height="225" fill="#fff" stroke="#E0E0E0" stroke-width="1" rx="0"/>
      
      <!-- Left side grey filler -->
      <rect x="0" y="0" width="156" height="225" fill="#D9D9D9"/>
      <text x="78" y="105" font-size="20" font-weight="500" fill="#444" text-anchor="middle" letter-spacing="0.5">來自於影片的</text>
      <text x="78" y="132" font-size="20" font-weight="500" fill="#444" text-anchor="middle" letter-spacing="0.5">重點截圖</text>
      
      <!-- Dots -->
      <circle cx="64" cy="210" r="4" fill="#fff"/>
      <circle cx="78" cy="210" r="4" fill="#fff"/>
      <circle cx="92" cy="210" r="4" fill="#fff"/>
      
      <!-- Right Side Content -->
      <text x="168" y="32" font-size="18" font-weight="600" fill="#111">餐廳/景點名稱(H3)</text>
      
      <circle cx="176" cy="56" r="7.5" fill="#D9D9D9"/>
      <text x="194" y="61" font-size="12" font-weight="500" fill="#111">XX市 XX區 XXXXX</text>
      
      <circle cx="176" cy="80" r="7.5" fill="#D9D9D9"/>
      <text x="194" y="85" font-size="12" font-weight="500" fill="#111">09:00 - 17:00 (營業中)</text>
      
      <text x="168" y="122" font-size="20" font-weight="600" fill="#111">200$~360$</text>
      
      <!-- Tags -->
      <rect x="168" y="142" width="56" height="20" rx="10" fill="#D9D9D9"/>
      <text x="196" y="156" font-size="10" font-weight="500" fill="#333" text-anchor="middle">#餐廳</text>
      
      <rect x="232" y="142" width="56" height="20" rx="10" fill="#D9D9D9"/>
      <text x="260" y="156" font-size="10" font-weight="500" fill="#333" text-anchor="middle">#善化區</text>
      
      <rect x="296" y="142" width="56" height="20" rx="10" fill="#D9D9D9"/>
      <text x="324" y="156" font-size="10" font-weight="500" fill="#333" text-anchor="middle">#未造訪</text>
      
      <!-- Share Icon -->
      <rect x="264" y="180" width="34" height="34" rx="2" fill="#D9D9D9"/>
      <g transform="translate(271, 187)">
        <circle cx="4" cy="10" r="2" fill="none" stroke="#222" stroke-width="1.5"/>
        <circle cx="15" cy="4" r="2" fill="none" stroke="#222" stroke-width="1.5"/>
        <circle cx="15" cy="16" r="2" fill="none" stroke="#222" stroke-width="1.5"/>
        <line x1="5.7" y1="8.8" x2="13" y2="5.2" stroke="#222" stroke-width="1.5"/>
        <line x1="5.7" y1="11.2" x2="13" y2="14.8" stroke="#222" stroke-width="1.5"/>
      </g>
      
      <!-- Pin Icon -->
      <rect x="306" y="180" width="34" height="34" rx="2" fill="#D9D9D9"/>
      <g transform="translate(315, 186)">
        <path d="M 8 1 C 5 1 2 4 2 7.5 C 2 12 8 18.5 8 18.5 C 8 18.5 14 12 14 7.5 C 14 4 11 1 8 1 Z" fill="none" stroke="#222" stroke-width="1.5"/>
        <circle cx="8" cy="7.5" r="2" fill="none" stroke="#222" stroke-width="1.5"/>
      </g>
    </g>
  </defs>

  <!-- Cards -->
  <use href="#card-template" x="16" y="180"/>
  <use href="#card-template" x="16" y="430"/>
  <use href="#card-template" x="16" y="680"/>

  <!-- Bottom nav bg -->
  <rect x="0" y="768" width="390" height="76" fill="#F4EFF6"/>

  <!-- Bottom nav icons -->
  <g transform="translate(68, 786)">
    <path d="M 0 -8 C -4 -8 -7 -5 -7 -1 C -7 4 0 10 0 10 C 0 10 7 4 7 -1 C 7 -5 4 -8 0 -8 Z" fill="#49454f"/>
    <circle cx="0" cy="-2" r="2.5" fill="#F4EFF6"/>
    <text x="0" y="24" font-size="11" font-weight="600" fill="#49454f" text-anchor="middle">篩選</text>
  </g>
  <g transform="translate(195, 786)">
    <circle cx="0" cy="0" r="9" fill="none" stroke="#49454f" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#49454f" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#49454f" stroke-width="1.5" stroke-linecap="round"/>
    <text x="0" y="24" font-size="11" font-weight="600" fill="#49454f" text-anchor="middle">匯入 Reels</text>
  </g>
  <g transform="translate(322, 786)">
    <g fill="none" stroke="#49454f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="-3" r="4.5"/>
      <path d="M -8 10 C -8 5 -4 3 0 3 C 4 3 8 5 8 10"/>
    </g>
    <text x="0" y="24" font-size="11" font-weight="600" fill="#49454f" text-anchor="middle">個人頁面</text>
  </g>
</svg>
